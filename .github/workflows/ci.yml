name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run tests
        id: run-tests
        run: |
          TEST_OUTPUT=$(pnpm test 2>&1)
          echo "$TEST_OUTPUT"
          PASSING=$(echo "$TEST_OUTPUT" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' | awk '{s+=$1} END {print s}')
          echo "passing=$PASSING" >> $GITHUB_OUTPUT

      - name: Update test badge
        if: github.ref == 'refs/heads/main'
        run: |
          PASSING="${{ steps.run-tests.outputs.passing }}"
          printf '{"schemaVersion":1,"label":"tests","message":"%s passing","color":"brightgreen"}' "$PASSING" > badges/tests.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/tests.json
          git diff --staged --quiet || git commit -m "chore: update test badge [skip ci]" && git push
